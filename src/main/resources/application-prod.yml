spring:
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

server:
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    com.liquifi: WARN
    root: ERROR
  file:
    name: /var/log/liquifi/backend.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
